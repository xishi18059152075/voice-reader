name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.6"
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Generate release keystore
        run: |
          keytool -genkey -v -keystore android/app/release.keystore \
            -alias release -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass 123456 -keypass 123456 \
            -dname "CN=VoiceReader, OU=App, O=VoiceReader, L=Beijing, ST=Beijing, C=CN" -noprompt
          echo "KEYSTORE_PASSWORD=123456" >> $GITHUB_ENV
          echo "KEY_PASSWORD=123456" >> $GITHUB_ENV
          echo "KEY_ALIAS=release" >> $GITHUB_ENV

      - name: Build APK (release signed)
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: voice-reader-apk
          path: build/app/outputs/flutter-apk/*.apk
          compression-level: 0
          retention-days: 30

      - name: Generate release notes
        run: |
          echo "# 语音朗读助手 - 构建完成" > release_notes.md
          echo "" >> release_notes.md
          echo "- 构建时间: $(date '+%Y-%m-%d %H:%M:%S')" >> release_notes.md
          echo "- 使用正式签名密钥" >> release_notes.md

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release_notes.md
