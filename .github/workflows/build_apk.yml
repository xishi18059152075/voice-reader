name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.6"
          channel: "stable"
          cache: true

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore android/app/upload-keystore.jks \
            -alias upload -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android2024 -keypass android2024 \
            -dname "CN=VoiceReader" -noprompt

      - name: Create key.properties
        run: |
          echo "storePassword=android2024" > android/key.properties
          echo "keyPassword=android2024" >> android/key.properties
          echo "keyAlias=upload" >> android/key.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (properly signed, non-debuggable)
        run: flutter build apk --release

      - name: Verify APK
        run: |
          SDK=$ANDROID_HOME
          APKSIGNER=$(find $SDK/build-tools -name apksigner -type f | sort -r | head -1)
          echo "=== 签名验证 ==="
          $APKSIGNER verify --verbose build/app/outputs/flutter-apk/app-release.apk
          echo ""
          echo "=== APK 文件 ==="
          ls -lh build/app/outputs/flutter-apk/app-release.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: voice-reader-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          compression-level: 0
          retention-days: 30
