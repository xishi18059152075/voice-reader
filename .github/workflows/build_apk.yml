name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.6"
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Build APK (release)
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: voice-reader-apk
          path: build/app/outputs/flutter-apk/*.apk
          compression-level: 0
          retention-days: 30

      - name: Generate release notes
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          echo "# 语音朗读助手 - 构建完成" > release_notes.md
          echo "" >> release_notes.md
          echo "- 构建时间: $(date '+%Y-%m-%d %H:%M:%S')" >> release_notes.md
          echo "- 提交: ${{ github.sha }}" >> release_notes.md
          echo "" >> release_notes.md
          echo "## APK 文件" >> release_notes.md
          ls -la build/app/outputs/flutter-apk/ >> release_notes.md

      - name: Upload release notes
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release_notes.md
