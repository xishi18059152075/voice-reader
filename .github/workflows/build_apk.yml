name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.6"
          channel: "stable"
          cache: true

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore android/app/upload-keystore.jks \
            -alias upload -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android2024 -keypass android2024 \
            -dname "CN=VoiceReader" -noprompt

      - name: Build APK
        run: flutter build apk --release

      - name: Strip debug artifacts + resign
        run: |
          APK=build/app/outputs/flutter-apk/app-release.apk
          SDK=$ANDROID_HOME
          APKSIGNER=$(find $SDK/build-tools -name apksigner -type f | sort -r | head -1)

          # 1) Strip DebugProbesKt.bin (the root cause)
          echo "=== 1) Striping debug artifacts ==="
          unzip -l $APK | grep -i "debugprobes" && zip -d $APK "DebugProbesKt.bin" || echo "No DebugProbesKt.bin found"

          # 2) Sign with v1+v2+v3
          echo "=== 2) Signing v1+v2+v3 ==="
          $APKSIGNER sign --ks android/app/upload-keystore.jks --ks-pass pass:android2024 \
            --ks-key-alias upload --v1-signing-enabled true --v2-signing-enabled true \
            --v3-signing-enabled true $APK

          # 3) Verify
          echo "=== 3) Verify ==="
          $APKSIGNER verify --verbose $APK
          unzip -l $APK | grep -i "debugprobes" && echo "FAIL: still has DebugProbesKt.bin" || echo "PASS: no DebugProbesKt.bin"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: voice-reader-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          compression-level: 0
          retention-days: 30
