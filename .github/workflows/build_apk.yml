name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.6"
          channel: "stable"
          cache: true

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore android/app/upload-keystore.jks \
            -alias upload -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=VoiceReader" -noprompt

      - name: Create key.properties
        run: |
          echo "storePassword=android" > android/key.properties
          echo "keyPassword=android" >> android/key.properties
          echo "keyAlias=upload" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (release signed)
        run: flutter build apk --release

      - name: Verify APK is signed
        run: |
          echo "=== 检查签名 ==="
          unzip -l build/app/outputs/flutter-apk/app-release.apk | grep -E "\.RSA|\.SF|\.MF" | head -5
          echo ""
          echo "=== APK 信息 ==="
          ls -la build/app/outputs/flutter-apk/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: voice-reader-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          compression-level: 0
          retention-days: 30
