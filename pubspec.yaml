name: voice_reader
description: PDF和Word文档情感朗读器 - 支持Azure TTS情感合成
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  file_picker: ^8.1.7
  shared_preferences: ^2.3.5
  http: ^1.2.2
  just_audio: ^0.9.43
  path_provider: ^2.1.5
  intl: ^0.19.0
  syncfusion_flutter_pdf: ^28.1.33
  archive: ^4.0.2
  xml: ^6.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
